services:
  postgres:
    image: postgres:16
    container_name: tacomoloco-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Crea las 7 BD (una por microservicio) al arrancar el contenedor
      POSTGRES_MULTIPLE_DATABASES: db_authserver,db_carrito,db_catalogo,db_inventario,db_pedidos,db_reportes,db_usuarios
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_authserver"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: tacomoloco_postgres_data
