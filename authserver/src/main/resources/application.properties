spring.application.name=authserver
server.port=9000

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/db_authserver}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# RSA Keys for JWT
jwt.rsa.public-key=classpath:keys/public.pem
jwt.rsa.private-key=classpath:keys/private.pem

# Usuarios microservice URL (for sync after register)
usuarios.service.url=http://localhost:8081
